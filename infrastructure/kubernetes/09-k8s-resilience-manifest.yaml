apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-core
  namespace: ares-nexus
  labels:
    app: settlement-core
    tier: mission-critical
spec:
  replicas: 3
  selector:
    matchLabels:
      app: settlement-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # Zero downtime requirement
  template:
    metadata:
      labels:
        app: settlement-core
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - settlement-core
            topologyKey: "kubernetes.io/hostname" # Ensure pods are on different physical nodes
      containers:
      - name: settlement-engine
        image: aresnexus.azurecr.io/settlement-core:latest
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
