name: AresNexus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AresNexus.slnx

    - name: Build
      run: dotnet build AresNexus.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test AresNexus.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage --settings coverlet.runsettings

    - name: ReportGenerator
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: 'coverage/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;Cobertura'

    - name: Check Coverage
      shell: pwsh
      run: |
        [xml]$xml = Get-Content coveragereport/Cobertura.xml
        $coverage = [double]$xml.coverage.'line-rate' * 100
        Write-Host "Code Coverage: $coverage%"
        if ($coverage -lt 70) {
          Write-Error "Code coverage is below 70% ($coverage%)"
          exit 1
        }

    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'aresnexus-settlement:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
