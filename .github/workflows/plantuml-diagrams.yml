name: Render PlantUML Diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'docs/architecture/diagrams-src/**'
      - '.github/workflows/plantuml-diagrams.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download PlantUML JAR
        run: |
          mkdir -p bin
          curl -L "https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar" -o bin/plantuml.jar

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Verify Graphviz installation
        run: dot -V

      - name: Render Diagrams
        run: |
          mkdir -p docs/diagrams
          java -jar bin/plantuml.jar -tpng -v -o ../../diagrams docs/architecture/diagrams-src/*.puml

      - name: Debug generated files
        run: |
          echo "Listing diagrams directory:"
          ls -la docs/diagrams || true

      - name: Commit and Push Changes
        run: |
          # Stage generated diagrams
          git add docs/diagrams

          # Check if there is anything staged
          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git config --local user.email "action@github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "docs: auto-generate architecture diagrams [skip ci]"
            git push
          fi
