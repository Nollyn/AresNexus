name: Render PlantUML Diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'docs/architecture/diagrams-src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download PlantUML JAR
        run: |
          mkdir -p bin
          curl -L "https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar" -o bin/plantuml.jar

      - name: Render Diagrams
        run: |
          mkdir -p docs/diagrams
          java -jar bin/plantuml.jar -tpng -v -o ../../diagrams docs/architecture/diagrams-src/*.puml

      - name: Commit and Push Changes
        run: |
          if git diff --quiet; then
            echo "No diagram changes"
          else
            git config --local user.email "action@github.com"
            git config --local user.name "github-actions[bot]"
            git add docs/diagrams/*.png
            git commit -m "docs: auto-generate architecture diagrams [skip ci]" --trailer "Co-authored-by: Junie <junie@jetbrains.com>"
            git push
          fi
