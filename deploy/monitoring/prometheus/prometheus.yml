global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "gateway-api"
    static_configs:
      - targets: ["gateway-api:8080"]

  - job_name: "compliance-engine"
    static_configs:
      - targets: ["compliance-engine:8080"]

  - job_name: "settlement-core"
    static_configs:
      - targets:
          - "settlement-core-1:8080"
          - "settlement-core-2:8080"
          - "settlement-core-3:8080"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
