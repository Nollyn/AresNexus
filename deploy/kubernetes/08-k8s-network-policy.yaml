apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: settlement-core-policy
  namespace: ares-nexus
  labels:
    tier: mission-critical
    compliance: finma-2023-1
spec:
  podSelector:
    matchLabels:
      app: settlement-core
  policyTypes:
  - Ingress
  - Egress
  
  # 1. INGRESS: Who can talk to the Settlement Core?
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway-api # Only the Gateway can initiate transactions
    ports:
    - protocol: TCP
      port: 8080

  # 2. EGRESS: Where can the Settlement Core talk to?
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: event-store-db # Only allowed to talk to its own database
    - podSelector:
        matchLabels:
          app: redis-cache # And the low-latency read model
    ports:
    - protocol: TCP
      port: 5432 # Postgres/Cosmos port
    - protocol: TCP
      port: 6379 # Redis port
      
  # 3. DNS ACCESS: Required for service discovery within Kubernetes
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
