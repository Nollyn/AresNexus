apiVersion: v1
kind: ResourceQuota
metadata:
  name: ares-nexus-quota
  namespace: ares-nexus
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ares-nexus-limits
  namespace: ares-nexus
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi
    type: Container
