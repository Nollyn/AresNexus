services:
  postgres-eventstore:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: AresNexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AresNexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  compliance-engine:
    build:
      context: .
      dockerfile: apps/compliance-engine/Dockerfile
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5).raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx-lb:
    image: nginx:alpine
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5000:80"
    depends_on:
      - settlement-core-1
      - settlement-core-2
      - settlement-core-3

  settlement-core-1:
    build:
      context: .
      dockerfile: apps/settlement-core/Dockerfile
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres-eventstore;Database=AresNexus;Username=postgres;Password=password123
      - ConnectionStrings__Redis=redis:6379
      - ServiceBus__ConnectionString=Endpoint=sb://mock.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=mock
      - Security__EncryptionKey=vE6p8W9xY2zB4A6C8E0G2I4K6M8O0Q2S
      - OTEL_SERVICE_NAME=settlement-core-1
    depends_on:
      postgres-eventstore:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  settlement-core-2:
    build:
      context: .
      dockerfile: apps/settlement-core/Dockerfile
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres-eventstore;Database=AresNexus;Username=postgres;Password=password123
      - ConnectionStrings__Redis=redis:6379
      - ServiceBus__ConnectionString=Endpoint=sb://mock.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=mock
      - Security__EncryptionKey=vE6p8W9xY2zB4A6C8E0G2I4K6M8O0Q2S
      - OTEL_SERVICE_NAME=settlement-core-2
    depends_on:
      postgres-eventstore:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  settlement-core-3:
    build:
      context: .
      dockerfile: apps/settlement-core/Dockerfile
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres-eventstore;Database=AresNexus;Username=postgres;Password=password123
      - ConnectionStrings__Redis=redis:6379
      - ServiceBus__ConnectionString=Endpoint=sb://mock.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=mock
      - Security__EncryptionKey=vE6p8W9xY2zB4A6C8E0G2I4K6M8O0Q2S
      - OTEL_SERVICE_NAME=settlement-core-3
    depends_on:
      postgres-eventstore:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway-api:
    build:
      context: .
      dockerfile: apps/gateway-api/Dockerfile
    depends_on:
      - nginx-lb
    environment:
      - SettlementApi__Url=http://nginx-lb
    ports:
      - "5001:8080"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
